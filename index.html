<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCARES/WNY SET Test Page</title>
    <style>
        /* Typography and layout */
        body {
            font-family: "Calibri", "Candara", "Segoe", "Segoe UI", "Optima", Arial, sans-serif;
            font-size: 16px; 
            line-height: 1.4;
            margin: 0; /* Removed margins to allow full width */
            padding: 20px;
            background-color: #fcfcfc;
            color: #222;
            display: flex;
            flex-direction: column;
            height: 100vh; /* Set body to full window height */
            box-sizing: border-box;
        }

        .header-text {
            margin-bottom: 15px;
            font-weight: bold;
            flex-shrink: 0; /* Prevents text from squishing */
        }

        /* This wrapper expands to fill the remaining space */
        .iframe-wrapper {
            flex-grow: 1; 
            width: 100%;
            border: 1px solid #000;
            overflow: hidden;
        }

        .iframe-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .footer {
            margin-top: 10px;
            font-size: 0.85em;
            color: #666;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="header-text">
        This is a test page for exploring CCARES/WNY SET outreach tools. <br>
        This is simulated SET data and will refresh every 15 minutes.
    </div>

    <div class="iframe-wrapper">
        <iframe 
            src="https://datastudio.google.com/embed/reporting/b2fc0ad9-e514-48e5-a32c-6c4134b95986/page/TC2xF" 
            allowfullscreen 
            sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox">
        </iframe>
    </div>

    <div class="footer">
        Operational Test Build - Station: N2QFD
    </div>

</body>
</html>
