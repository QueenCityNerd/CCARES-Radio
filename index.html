<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCARES/WNY SET Test Page</title>
    <style>
        /* Typography and layout */
        body, html {
            font-family: "Calibri", "Candara", "Segoe", "Segoe UI", "Optima", Arial, sans-serif;
            font-size: 16px; 
            line-height: 1.4;
            margin: 0; /* Critical: removes the default white border around the page */
            padding: 0; /* Critical: removes internal spacing */
            background-color: #fcfcfc;
            color: #222;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevents scrollbars from appearing */
        }

        .header-text {
            padding: 10px 20px; /* Gives the text a little breathing room from the edge */
            font-weight: bold;
            flex-shrink: 0;
            background: #ffffff;
            border-bottom: 1px solid #ccc;
        }

        /* This wrapper takes up every remaining pixel of the screen */
        .iframe-wrapper {
            flex-grow: 1; 
            width: 100%;
            height: 100%;
        }

        .iframe-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block; /* Removes tiny bottom gap common in iframes */
        }

        .footer {
            padding: 5px 20px;
            font-size: 0.85em;
            color: #666;
            flex-shrink: 0;
            background: #f1f1f1;
        }
    </style>
</head>
<body>

    <div class="header-text">
        This is a test page for exploring CCARES/WNY SET outreach tools. <br>
        This is simulated SET data and will refresh every 15 minutes.
    </div>

    <div class="iframe-wrapper">
        <iframe 
            src="https://datastudio.google.com/embed/reporting/b2fc0ad9-e514-48e5-a32c-6c4134b95986/page/TC2xF" 
            allowfullscreen 
            sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox">
        </iframe>
    </div>

    <div class="footer">
        Operational Test Build - Station: N2QFD
    </div>

</body>
</html>
